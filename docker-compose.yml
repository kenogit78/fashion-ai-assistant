version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: fashion_ai_db
    environment:
      POSTGRES_DB: fashion_ai
      POSTGRES_USER: fashion_user
      POSTGRES_PASSWORD: fashion_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fashion_user -d fashion_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: